apiVersion: v1
kind: ServiceAccount
metadata:
  name: imagestream-waiter
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: imagestream-waiter
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["image.openshift.io"]
    resources: ["imagestreams"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: imagestream-waiter
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: imagestream-waiter
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: imagestream-waiter
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-imagestreams
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      serviceAccountName: imagestream-waiter
      restartPolicy: OnFailure
      containers:
        - name: wait
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for ImageStreams to import..."
              until oc get imagestream agent-mesh-data-generation -n {{ .Values.namespace }} \
                -o jsonpath='{.status.tags[0].items[0].image}' 2>/dev/null | grep -q sha256; do
                echo "Waiting for agent-mesh-data-generation..."
                sleep 5
              done
              echo "agent-mesh-data-generation ready"
              until oc get imagestream agent-mesh-data-indexing -n {{ .Values.namespace }} \
                -o jsonpath='{.status.tags[0].items[0].image}' 2>/dev/null | grep -q sha256; do
                echo "Waiting for agent-mesh-data-indexing..."
                sleep 5
              done
              echo "agent-mesh-data-indexing ready"
              echo "All ImageStreams imported successfully"
